<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SyncNote Pro - Setup Wizard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #e8f0f8 0%, #dce8f5 30%, #eef3f9 60%, #e4ecf6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: fixed;
            top: -180px;
            right: -120px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(13, 148, 136, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -140px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .installer-window {
            width: 620px;
            max-width: 100%;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10), 0 2px 10px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .installer-header {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 40%, #115e59 100%);
            color: #ffffff;
            padding: 28px 32px 22px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .installer-header::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -30px;
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            pointer-events: none;
        }

        .installer-header::after {
            content: '';
            position: absolute;
            bottom: -50px;
            left: -20px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            pointer-events: none;
        }

        .app-icon-wrapper {
            position: relative;
            z-index: 1;
            display: inline-block;
            margin-bottom: 14px;
        }

        .app-icon {
            width: 68px;
            height: 68px;
            background: #ffffff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 1;
        }

        .installer-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.2px;
            position: relative;
            z-index: 1;
        }

        .installer-header .tagline {
            font-size: 13px;
            opacity: 0.85;
            font-weight: 400;
            letter-spacing: 0.1px;
            position: relative;
            z-index: 1;
        }

        .urgency-strip {
            background: #fef9e7;
            border-bottom: 1px solid #fde68a;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12.5px;
            color: #92400e;
            font-weight: 500;
        }

        .urgency-strip .dot {
            width: 8px;
            height: 8px;
            background: #f59e0b;
            border-radius: 50%;
            animation: pulse-dot 1.6s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(1.6);
            }
        }

        .progress-section {
            padding: 20px 32px 0;
            position: relative;
        }

        .progress-bar-row {
            display: flex;
            align-items: center;
            gap: 0;
            position: relative;
        }

        .progress-step-node {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            transition: all 0.35s ease;
            background: #e5e7eb;
            color: #9ca3af;
        }

        .progress-step-node.completed {
            background: #10b981;
            color: #ffffff;
        }

        .progress-step-node.active {
            background: #0d9488;
            color: #ffffff;
            box-shadow: 0 0 0 6px rgba(13, 148, 136, 0.15);
        }

        .progress-connector {
            flex: 1;
            height: 3px;
            background: #e5e7eb;
            border-radius: 2px;
            margin: 0 4px;
            transition: all 0.5s ease;
            position: relative;
            z-index: 0;
        }

        .progress-connector.completed {
            background: #10b981;
        }

        .progress-connector.active-segment {
            background: linear-gradient(90deg, #10b981 0%, #0d9488 60%, #e5e7eb 100%);
        }

        .step-labels-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0 14px;
            gap: 4px;
        }

        .step-label-item {
            font-size: 10.5px;
            color: #9ca3af;
            text-align: center;
            flex: 1;
            min-width: 0;
            transition: color 0.3s ease;
            font-weight: 500;
            letter-spacing: 0.1px;
        }

        .step-label-item.completed {
            color: #10b981;
        }

        .step-label-item.active {
            color: #0d9488;
            font-weight: 600;
        }

        .content-area {
            padding: 10px 32px 24px;
        }

        .section-heading {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-heading .icon {
            font-size: 18px;
        }

        .eula-container {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            background: #fafbfc;
            height: 310px;
            overflow-y: auto;
            padding: 20px 22px;
            margin-bottom: 18px;
            font-size: 12.5px;
            line-height: 1.75;
            color: #4b5563;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.04);
            scroll-behavior: smooth;
        }

        .eula-container::-webkit-scrollbar {
            width: 6px;
        }

        .eula-container::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 3px;
        }

        .eula-container::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        .eula-container::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }

        .eula-container h3 {
            font-size: 13px;
            color: #1f2937;
            margin: 16px 0 6px;
            font-weight: 600;
            letter-spacing: 0.1px;
        }

        .eula-container h3:first-child {
            margin-top: 0;
        }

        .eula-container p {
            margin-bottom: 8px;
            text-align: justify;
        }

        .eula-container .bold-term {
            font-weight: 600;
            color: #374151;
        }

        .checkbox-agreement {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            transition: border-color 0.2s ease;
        }

        .checkbox-agreement:hover {
            border-color: #cbd5e0;
        }

        .checkbox-agreement input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            flex-shrink: 0;
            accent-color: #0d9488;
            cursor: pointer;
        }

        .checkbox-agreement label {
            font-size: 13px;
            color: #374151;
            line-height: 1.5;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-agreement label .required-mark {
            color: #ef4444;
            font-weight: 600;
        }

        .action-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 13px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            letter-spacing: 0.2px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-back {
            background: #f3f4f6;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            flex-shrink: 0;
        }

        .btn-back:hover {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-install {
            flex: 1;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(13, 148, 136, 0.25);
            font-size: 15px;
        }

        .btn-install:hover:not(:disabled) {
            background: linear-gradient(135deg, #0f766e 0%, #115e59 100%);
            box-shadow: 0 4px 14px rgba(13, 148, 136, 0.35);
            transform: translateY(-1px);
        }

        .btn-install:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 1px 4px rgba(13, 148, 136, 0.2);
        }

        .btn-install:disabled {
            background: #cbd
