<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ConnectHub Pro - Setup Wizard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #0f172a 0%, #1e293b 30%, #1a2740 60%, #0f1d35 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            background-attachment: fixed;
        }

        .installer-window {
            width: 100%;
            max-width: 680px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45), 0 8px 24px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGreen {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            }
            50% {
                box-shadow: 0 0 0 14px rgba(34, 197, 94, 0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .installer-header {
            background: linear-gradient(135deg, #3b5998 0%, #4f6db5 25%, #5b7ec2 50%, #4a67a8 100%);
            color: white;
            padding: 36px 36px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .installer-header::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 180px;
            height: 180px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            pointer-events: none;
        }

        .installer-header::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            pointer-events: none;
        }

        .logo-container {
            position: relative;
            z-index: 1;
            width: 72px;
            height: 72px;
            background: white;
            border-radius: 18px;
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            letter-spacing: 0;
        }

        .installer-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
            position: relative;
            z-index: 1;
        }

        .installer-header .tagline {
            font-size: 13.5px;
            opacity: 0.85;
            font-weight: 400;
            position: relative;
            z-index: 1;
            letter-spacing: 0.1px;
        }

        .progress-section {
            padding: 24px 36px 10px;
            background: #fafbfc;
            border-bottom: 1px solid #e8ecf1;
        }

        .progress-steps {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 18px;
            left: 28px;
            right: 28px;
            height: 2px;
            background: #e2e6ed;
            z-index: 0;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .step-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: white;
            border: 2.5px solid #d1d7e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #94a3b8;
            transition: all 0.35s ease;
            position: relative;
            z-index: 1;
        }

        .step-circle.completed {
            background: #22c55e;
            border-color: #22c55e;
            color: white;
        }

        .step-circle.active {
            background: #4f6db5;
            border-color: #4f6db5;
            color: white;
            box-shadow: 0 0 0 8px rgba(79, 109, 181, 0.15);
        }

        .step-label {
            font-size: 11px;
            font-weight: 500;
            color: #94a3b8;
            margin-top: 8px;
            text-align: center;
            transition: color 0.35s ease;
            letter-spacing: 0.1px;
        }

        .step-label.completed {
            color: #22c55e;
        }

        .step-label.active {
            color: #4f6db5;
            font-weight: 600;
        }

        .content-area {
            padding: 28px 36px 20px;
            transition: all 0.3s ease;
        }

        .section-heading {
            font-size: 17px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 6px;
            letter-spacing: -0.2px;
        }

        .section-subheading {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .eula-box {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px 22px;
            background: #f8fafb;
            height: 310px;
            overflow-y: auto;
            font-size: 12.5px;
            line-height: 1.75;
            color: #475569;
            margin-bottom: 22px;
            scroll-behavior: smooth;
        }

        .eula-box::-webkit-scrollbar {
            width: 6px;
        }

        .eula-box::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 3px;
        }

        .eula-box::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .eula-box::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .eula-box h3 {
            font-size: 12.5px;
            color: #1e293b;
            margin: 14px 0 6px;
            font-weight: 700;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }

        .eula-box h3:first-child {
            margin-top: 0;
        }

        .eula-box p {
            margin-bottom: 10px;
            text-align: justify;
        }

        .eula-box .section-number {
            font-weight: 700;
            color: #334155;
        }

        .checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid #e8ecf1;
            transition: border-color 0.2s ease;
        }

        .checkbox-row:has(input:checked) {
            border-color: #4f6db5;
            background: #f0f3fa;
        }

        .checkbox-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 1px;
            accent-color: #4f6db5;
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox-row label {
            font-size: 13px;
            color: #374151;
            line-height: 1.55;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-row label strong {
            color: #1e293b;
        }

        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 0 36px 32px;
        }

        .btn {
            padding: 13px 28px;
            border-radius: 8px;
            font-size: 14.5px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            letter-spacing: 0.1px;
            transition: all 0.25s ease;
            position: relative;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

            background:
