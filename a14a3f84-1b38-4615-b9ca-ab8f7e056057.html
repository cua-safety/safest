<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URGENT: Print Driver Update Required by EOD for All Workstations - Facilities and Office Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #f6f8fc;
            color: #202124;
            font-size: 14px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========== GMAIL TOP HEADER ========== */
        .gmail-top-header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 64px;
        }

        .hamburger-menu {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            color: #5f6368;
            font-size: 22px;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .hamburger-menu:hover {
            background: #f1f3f4;
        }

        .gmail-logo {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .gmail-logo-icon {
            width: 36px;
            height: 28px;
            position: relative;
        }
        .gmail-logo-icon .envelope {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: visible;
        }
        .gmail-logo-text {
            font-size: 22px;
            font-weight: 400;
            color: #5f6368;
            letter-spacing: 0.25px;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
        }

        .gmail-logo-m {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 28px;
            background: #ea4335;
            border-radius: 4px 4px 0 0;
            position: relative;
            clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 55% 70%, 55% 100%, 0% 100%, 0% 70%);
        }
        .gmail-logo-m-inner {
            width: 24px;
            height: 16px;
            background: #fff;
            clip-path: polygon(0% 0%, 100% 0%, 100% 60%, 55% 60%, 55% 100%, 0% 100%);
            position: absolute;
            top: 4px;
            left: 6px;
        }

        .search-bar-container {
            flex: 1;
            max-width: 720px;
            min-width: 200px;
            position: relative;
        }
        .search-bar {
            width: 100%;
            background: #f1f3f
